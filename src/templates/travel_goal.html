<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Goal – FinanceTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">BudgetTracker</span>
        <a href="/home">Home</a>
        <a href="/budget">Budget</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/travel-goal" class="active">Travel Goal</a>
        <a href="/about">About</a>
    </div>
    <div>
        <a href="/login">Sign Out</a>
    </div>
</nav>

<div class="container">
    <h1>✈ Travel Savings Goal</h1>

    <div class="goal-status-card">

    <div class="goal-header">
        <h2>TRAVEL GOAL STATUS</h2>
        <div class="goal-numbers">
            <div>
                <span>Saved</span>
                <strong id="goalSaved">$0</strong>
            </div>
            <div>
                <span>Left</span>
                <strong id="goalLeft">$0</strong>
            </div>
        </div>
    </div>

    <div class="goal-bar-wrapper">
        <div class="goal-bar-fill" id="travelProgress">
            <span class="goal-percent" id="travelPercent">0% saved</span>
        </div>
        <span class="goal-remaining-text" id="goalRemainingText">$0 left</span>
    </div>

    </div>


    <div class="section travel-card">

        <div class="input-group">
            <label>Travel Goal Amount ($)</label>
            <input type="number" id="goalAmount" placeholder="Enter goal amount">
        </div>

        <div class="input-group">
            <label>Add Contribution ($)</label>
            <input type="number" id="contributionAmount" placeholder="Enter amount to add">
        </div>

        <button id="addBtn">Add Contribution</button>

        
        <button id="resetGoal">Reset Goal</button>

        <div class="summary" id="goalSummary"></div>
        <div class="celebrate" id="goalCelebrate"></div>

    </div>
</div>
</body>
</html>
