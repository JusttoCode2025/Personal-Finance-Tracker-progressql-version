<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Budget Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

<!-- Nav Bar-->
<nav class="navbar">
    <div class="nav-left">
        <span class="logo">BudgetTracker</span>

        <a href="/home">Home</a>
        <a href="/budget" class="active">Budget</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/travel-goal">Travel Goal</a>
        <a href="/about">About</a>
    </div>

    <div class="nav-right">
        <a href="/login">Sign Out</a>
    </div>
</nav>

<!-- End of Nav Bar-->
<div class="container">

    <h1>Budget Tracker</h1>

  
<div class="flex-row">

    <!-- SET CATEGORY LIMIT -->
    <section class="section flex-item">
        <h2>Set Category Limit</h2>

        <div class="form-row">
            <select id="limitCategory">
                <option value="">Select Category</option>
                <option>Rent</option>
                <option>Groceries</option>
                <option>Utilities</option>
                <option>Transportation</option>
                <option>Entertainment</option>
                <option>Other</option>
            </select>

            <input
                id="categoryLimit"
                type="number"
                placeholder="Monthly Limit"
            >

            <button onclick="setCategoryLimit()">Set Limit</button>
        </div>
    </section>

    <!-- ADD PURCHASE -->
    <section class="section flex-item">
        <h2>Add Purchase</h2>

        <div class="form-row">
            <select id="purchaseCategory">
                <option value="">Select Category</option>
                <option>Rent</option>
                <option>Groceries</option>
                <option>Utilities</option>
                <option>Transportation</option>
                <option>Entertainment</option>
                <option>Other</option>
            </select>

            <input
                id="purchaseAmount"
                type="number"
                placeholder="Amount"
            >

            <button onclick="addPurchase()">Add Purchase</button>
        </div>

        <p id="purchaseMessage"></p>
    </section>

</div>

<!--CATEGORY OVERVIEW -->
<div class="flex-row">

    <section class="section flex-item">
        <h2>Category Overview</h2>

        <ul id="categoryTable" class="expenses-list">
            <li class="empty-state">
                No categories yet 
            </li>
        </ul>
    </section>

    <section class="section flex-item">
        <h2>Last 5 Purchases</h2>

        <ul id="recentPurchases" class="expenses-list">
            <li class="empty-state">
                No purchases yet.
            </li>
        </ul>
    </section>

</div>

</body>
</html>
